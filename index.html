<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Power BI</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body, html {
      height: 100%;
      overflow: hidden;
    }
    
    iframe { 
      width: 100%; 
      height: 100vh; 
      border: none; 
    }
  </style>
</head>
<body>
  <iframe 
    id="powerbi-iframe"
    src="https://app.fabric.microsoft.com/reportEmbed?reportId=a09a30e9-0954-4ab6-9455-cd3f396efdbe&autoAuth=true&ctid=ea38e8bc-2dca-498c-baf2-f138a9968398&chromeless=1&hidePageNavigation=true&hideBookmarks=true&hideHeader=true&hideFooter=true" 
    allowfullscreen="true">
  </iframe>

  <script>
    // Função para atualizar o dashboard
    function refreshDashboard() {
      const iframe = document.getElementById('powerbi-iframe');
      iframe.src = iframe.src;
    }

    // Atualização automática a cada 15 segundos
    setInterval(refreshDashboard, 1800000);
  </script>
</body>
</html>
